apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: flux-system
resources:
  - mytra-site.yaml
  - ../../mytra-helm-charts.yaml
configMapGenerator:
  - name: site-values
    namespace: flux-system
    files:
      - values.yaml=../../site-values.yaml
  - name: cluster-values
    namespace: flux-system
    files:
      - values.yaml=../cluster-values.yaml
configurations:
  - ../../kustomize-config.yaml
