name: Flux Image Updates Auto-PR Create
on:
  create:

jobs:
  pull-request:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    if: |
      github.event.ref_type == 'branch' &&
      github.event.ref == 'flux-image-updates' 
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
      with:
        fetch-depth: 0
        token: ${{ secrets.MYTRA_MACHINE_USER_PAT }}
    - name: Get last commit message
      id: get_last_commit_message
      run: |
        git fetch origin ${{ github.event.repository.default_branch }}
        last_commit_message=$(git log origin/${{ github.event.repository.default_branch }}..HEAD --pretty=%B)
        echo "last_commit_message<<EOF" >> $GITHUB_OUTPUT
        echo "$last_commit_message" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    - name: Create Pull Request
      env:
        GH_TOKEN: ${{ secrets.MYTRA_MACHINE_USER_PAT }}
      run: |
        gh pr create \
          --head=${{ github.head_ref }} \
          --base=${{ github.event.repository.default_branch }} \
          --title=":arrow_heading_up: Flux Image Updates Auto-PR" \
          --body="${{ steps.get_last_commit_message.outputs.last_commit_message }}" \
