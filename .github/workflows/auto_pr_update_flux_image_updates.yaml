name: Flux Image Updates Auto-PR Update
on:
  pull_request:
    types: [synchronize]
    branches:
      - main

jobs:
  pull-request:
    if: github.head_ref == 'flux-image-updates'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.MYTRA_MACHINE_USER_PAT }}
    - name: Get commit messages
      id: commit_messages
      run: |
        git fetch origin ${{ github.event.repository.default_branch }}
        commit_messages=$(git log origin/${{ github.event.repository.default_branch }}..HEAD --pretty=%B --author=fluxcdbot@users.noreply.github.com)
        echo "commit_messages: $commit_messages"
        echo "commit_messages<<EOF" >> $GITHUB_OUTPUT
        echo "$commit_messages" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    - name: Update Pull Request
      env:
        GH_TOKEN: ${{ secrets.MYTRA_MACHINE_USER_PAT }}
      run: |
        gh pr edit ${{ github.event.pull_request.number }} \
          --body="${{ steps.commit_messages.outputs.commit_messages }}" \
